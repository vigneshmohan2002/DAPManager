<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAP Manager — API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
    <style>
        body { margin: 0; background: #fafafa; }
        .topbar { display: none; }
        .dap-banner {
            font-family: -apple-system, system-ui, sans-serif;
            background: #1f2933; color: #fff; padding: 10px 18px; font-size: 14px;
        }
        .dap-banner a { color: #7fd1ff; }
    </style>
</head>
<body>
    <div class="dap-banner">
        DAP Manager API — interactive docs.
        Spec: <a href="/api/openapi.json">/api/openapi.json</a>.
        New install? Start with <code>GET /api/setup/status</code> then
        <code>POST /api/save_config</code>.
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
        window.ui = SwaggerUIBundle({
            url: '/api/openapi.json',
            dom_id: '#swagger-ui',
            deepLinking: true,
            tryItOutEnabled: true,
            presets: [SwaggerUIBundle.presets.apis],
            layout: 'BaseLayout',
        });
    </script>
</body>
</html>

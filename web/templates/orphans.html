<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAP Manager — Orphans</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .orphan-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .orphan-table th,
        .orphan-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #333;
            text-align: left;
            vertical-align: middle;
        }
        .orphan-table th {
            background: #222;
            color: #ddd;
        }
        .orphan-table tr:hover {
            background: #1b1b1b;
        }
        .muted {
            color: #888;
            font-size: 12px;
        }
        .empty {
            padding: 20px;
            color: #888;
            text-align: center;
            font-style: italic;
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-bottom: 1px solid #333;
        }
        .tab {
            padding: 10px 18px;
            cursor: pointer;
            color: #aaa;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            color: #fff;
            border-bottom-color: #8bd;
        }
        .tab:hover {
            color: #ddd;
        }
        .badge {
            display: inline-block;
            padding: 1px 8px;
            border-radius: 10px;
            background: #553;
            color: #fea;
            font-size: 11px;
            margin-left: 6px;
        }
        .row-actions button {
            margin-right: 6px;
            font-size: 12px;
            padding: 4px 10px;
        }
        .row-actions .danger {
            background: #522;
            color: #fdd;
            border: 1px solid #733;
        }
        .row-actions .danger:hover {
            background: #733;
        }
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Orphans</h1>
            <div class="muted">
                Soft-deleted tracks and playlists. Restore to bring them back,
                or purge to permanently remove the row.
                <a href="/" style="color:#8bd;">← Dashboard</a>
            </div>
        </header>

        <main>
            <section class="card">
                <div class="tabs">
                    <div class="tab active" data-tab="tracks" onclick="selectTab('tracks')">
                        Tracks <span class="badge" id="tracks-count">0</span>
                    </div>
                    <div class="tab" data-tab="playlists" onclick="selectTab('playlists')">
                        Playlists <span class="badge" id="playlists-count">0</span>
                    </div>
                </div>

                <div id="tab-tracks">
                    <div class="toolbar">
                        <button onclick="reloadTracks()">Refresh</button>
                        <span class="muted" id="tracks-status"></span>
                    </div>
                    <div id="tracks-container">
                        <div class="empty">Loading…</div>
                    </div>
                </div>

                <div id="tab-playlists" style="display:none;">
                    <div class="toolbar">
                        <button onclick="reloadPlaylists()">Refresh</button>
                        <span class="muted" id="playlists-status"></span>
                    </div>
                    <div id="playlists-container">
                        <div class="empty">Loading…</div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function selectTab(name) {
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.toggle('active', t.dataset.tab === name);
            });
            document.getElementById('tab-tracks').style.display = (name === 'tracks') ? '' : 'none';
            document.getElementById('tab-playlists').style.display = (name === 'playlists') ? '' : 'none';
        }

        async function reloadTracks() {
            const container = document.getElementById('tracks-container');
            const countBadge = document.getElementById('tracks-count');
            container.innerHTML = '<div class="empty">Loading…</div>';
            try {
                const resp = await fetch('/api/orphans/tracks');
                const data = await resp.json();
                if (!data.success) {
                    container.innerHTML = `<div class="empty">Error: ${escapeHtml(data.message || 'unknown')}</div>`;
                    return;
                }
                const rows = data.tracks || [];
                countBadge.textContent = rows.length;
                if (!rows.length) {
                    container.innerHTML = '<div class="empty">No orphan tracks.</div>';
                    return;
                }
                let html = '<table class="orphan-table"><thead><tr>'
                    + '<th>Artist</th><th>Title</th><th>Album</th>'
                    + '<th>Deleted</th><th>On disk</th><th>Actions</th>'
                    + '</tr></thead><tbody>';
                for (const r of rows) {
                    const mbid = encodeURIComponent(r.mbid);
                    const hasFile = !!(r.local_path && r.local_path.trim());
                    html += `<tr data-mbid="${escapeHtml(r.mbid)}">
                        <td>${escapeHtml(r.artist || '')}</td>
                        <td>${escapeHtml(r.title || '')}</td>
                        <td>${escapeHtml(r.album || '')}</td>
                        <td class="muted">${escapeHtml(r.deleted_at || '')}</td>
                        <td class="muted" title="${escapeHtml(r.local_path || '')}">
                            ${hasFile ? 'yes' : '<span class="muted">—</span>'}
                        </td>
                        <td class="row-actions">
                            <button onclick="restoreTrack('${mbid}')">Restore</button>
                            ${hasFile
                                ? `<button class="danger" onclick="deleteTrackFile('${mbid}')">Delete file</button>`
                                : ''}
                            <button class="danger" onclick="purgeTrack('${mbid}')">Purge</button>
                        </td>
                    </tr>`;
                }
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<div class="empty">Failed: ${escapeHtml(String(e))}</div>`;
            }
        }

        async function reloadPlaylists() {
            const container = document.getElementById('playlists-container');
            const countBadge = document.getElementById('playlists-count');
            container.innerHTML = '<div class="empty">Loading…</div>';
            try {
                const resp = await fetch('/api/orphans/playlists');
                const data = await resp.json();
                if (!data.success) {
                    container.innerHTML = `<div class="empty">Error: ${escapeHtml(data.message || 'unknown')}</div>`;
                    return;
                }
                const rows = data.playlists || [];
                countBadge.textContent = rows.length;
                if (!rows.length) {
                    container.innerHTML = '<div class="empty">No orphan playlists.</div>';
                    return;
                }
                let html = '<table class="orphan-table"><thead><tr>'
                    + '<th>Name</th><th>Tracks</th><th>Deleted</th><th>Actions</th>'
                    + '</tr></thead><tbody>';
                for (const r of rows) {
                    const pid = encodeURIComponent(r.playlist_id);
                    html += `<tr>
                        <td>${escapeHtml(r.name || '')}</td>
                        <td>${r.track_count}</td>
                        <td class="muted">${escapeHtml(r.deleted_at || '')}</td>
                        <td class="row-actions">
                            <button onclick="restorePlaylist('${pid}')">Restore</button>
                            <button class="danger" onclick="purgePlaylist('${pid}', ${r.track_count})">Purge</button>
                        </td>
                    </tr>`;
                }
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = `<div class="empty">Failed: ${escapeHtml(String(e))}</div>`;
            }
        }

        async function postAndReload(url, method, reload, statusElId, successMsg) {
            const status = document.getElementById(statusElId);
            status.textContent = '…';
            try {
                const resp = await fetch(url, { method });
                const data = await resp.json();
                if (!data.success) {
                    status.textContent = 'Error: ' + (data.message || resp.status);
                    return;
                }
                status.textContent = successMsg;
                reload();
            } catch (e) {
                status.textContent = 'Failed: ' + e;
            }
        }

        function restoreTrack(mbid) {
            postAndReload(`/api/tracks/${mbid}/restore`, 'POST', reloadTracks, 'tracks-status', 'Restored.');
        }
        function purgeTrack(mbid) {
            if (!confirm('Permanently remove this track row? This cannot be undone.')) return;
            postAndReload(`/api/tracks/${mbid}?purge=true`, 'DELETE', reloadTracks, 'tracks-status', 'Purged.');
        }
        function deleteTrackFile(mbid) {
            if (!confirm('Delete the file on disk? The orphan row stays until you Purge it.')) return;
            postAndReload(`/api/tracks/${mbid}/file`, 'DELETE', reloadTracks, 'tracks-status', 'File deleted.');
        }
        function restorePlaylist(pid) {
            postAndReload(`/api/playlists/${pid}/restore`, 'POST', reloadPlaylists, 'playlists-status', 'Restored.');
        }
        function purgePlaylist(pid, trackCount) {
            const extra = trackCount > 0
                ? ` (removes ${trackCount} membership row${trackCount === 1 ? '' : 's'})`
                : '';
            if (!confirm(`Permanently remove this playlist${extra}? This cannot be undone.`)) return;
            postAndReload(`/api/playlists/${pid}?purge=true`, 'DELETE', reloadPlaylists, 'playlists-status', 'Purged.');
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        reloadTracks();
        reloadPlaylists();
    </script>
</body>

</html>

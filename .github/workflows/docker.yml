name: Docker build

on:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - .dockerignore
      - requirements-server.txt
      - scripts/docker-entrypoint.sh
      - docker-compose.example.yml
      - src/**
      - web/**
      - web_server.py
      - .github/workflows/docker.yml
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - requirements-server.txt
      - scripts/docker-entrypoint.sh
      - docker-compose.example.yml
      - src/**
      - web/**
      - web_server.py
      - .github/workflows/docker.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: dapmanager:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test sldl is on PATH
        run: docker run --rm --entrypoint which dapmanager:ci sldl

      - name: Smoke-test web_server import
        run: docker run --rm --entrypoint python dapmanager:ci -c "import web_server"

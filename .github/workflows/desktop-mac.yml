name: Desktop (Mac)

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install JS deps
        working-directory: desktop
        run: npm ci

      - name: Build universal .app bundle
        working-directory: desktop
        run: npx tauri build --bundles app --target universal-apple-darwin

      - name: Zip .app
        working-directory: desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos
        run: ditto -c -k --sequesterRsrc --keepParent DAPManager.app DAPManager-mac.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DAPManager-mac
          path: desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/DAPManager-mac.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/DAPManager-mac.zip

# Master-mode DAPManager. Copy to docker-compose.yml and edit.
#
# On first start the entrypoint seeds ./config/config.json with master
# defaults. Visit http://localhost:5001/setup (or edit config.json) to
# fill in Soulseek / Jellyfin / Lidarr credentials.
#
# The image bakes in sldl (slsk-batchdl) from upstream's GitHub release.
# Bump or pin with --build-arg SLDL_VERSION=vX.Y.Z (amd64 + arm64).

services:
  dapmanager:
    build: .
    image: dapmanager:latest
    container_name: dapmanager
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./config:/config
      - ./data:/data
    environment:
      DAPMANAGER_DEBUG: "0"
      # Optional: change the app's listening port inside the container.
      # DAPMANAGER_PORT: "5001"

  # Lidarr + Prowlarr ride the `arr` profile: they only start when you
  # opt in, either via `docker compose --profile arr up -d` or with
  # `./setup-master.sh` (which handles wiring automatically).
  # Soulseek (sldl) remains the primary downloader inside dapmanager;
  # these sidecars are for Usenet/torrent indexer searches via Lidarr.
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    profiles: ["arr"]
    ports:
      - "8686:8686"
    volumes:
      - ./lidarr-config:/config
      - ./data/music:/music
      - ./data/downloads:/downloads

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    profiles: ["arr"]
    ports:
      - "9696:9696"
    volumes:
      - ./prowlarr-config:/config

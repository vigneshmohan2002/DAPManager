# Master-mode DAPManager. Copy to docker-compose.yml and edit.
#
# Recommended first-run path (handles everything automatically):
#   Windows:  .\scripts\setup-master.ps1
#   Linux/Mac: ./setup-master.sh
#
# Both scripts detect Tailscale, start containers, wire Prowlarr → Lidarr,
# and push credentials into DAPManager. Pass Soulseek creds via env:
#   Windows:  $env:SLSK_USERNAME="user"; $env:SLSK_PASSWORD="pass"; .\scripts\setup-master.ps1
#   Linux/Mac: SLSK_USERNAME=user SLSK_PASSWORD=pass ./setup-master.sh
#
# The image bakes in sldl (slsk-batchdl) from upstream's GitHub release.
# Bump or pin with --build-arg SLDL_VERSION=vX.Y.Z (amd64 + arm64).

services:
  dapmanager:
    build: .
    image: dapmanager:latest
    container_name: dapmanager
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./config:/config
      - ./data:/data
    environment:
      DAPMANAGER_DEBUG: "0"
      # Optional: change the app's listening port inside the container.
      # DAPMANAGER_PORT: "5001"
      # Public URL satellites use to reach this master. Populated by
      # scripts/bootstrap-master.{sh,ps1} from the host's Tailscale
      # state; passes through empty if unset, in which case the setup
      # wizard prompts for it manually.
      MASTER_PUBLIC_URL: ${MASTER_PUBLIC_URL:-}

  # Lidarr + Prowlarr ride the `arr` profile: they only start when you
  # opt in, either via `docker compose --profile arr up -d` or with
  # `./setup-master.sh` (which handles wiring automatically).
  # Soulseek (sldl) remains the primary downloader inside dapmanager;
  # these sidecars are for Usenet/torrent indexer searches via Lidarr.
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    profiles: ["arr"]
    ports:
      - "8686:8686"
    volumes:
      - ./lidarr-config:/config
      - ./data/music:/music
      - ./data/downloads:/downloads

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    profiles: ["arr"]
    ports:
      - "9696:9696"
    volumes:
      - ./prowlarr-config:/config

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    profiles: ["arr"]
    ports:
      - "8080:8080"      # WebUI — visit after setup to add indexers manually if needed
    volumes:
      - ./qbittorrent-config:/config
      - ./data/downloads:/downloads
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
      WEBUI_PORT: 8080
